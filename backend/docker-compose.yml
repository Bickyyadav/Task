version: "3.9"

services:
  # ── FastAPI Application ────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pm_api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - .:/app
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pm_network

  # ── MongoDB ────────────────────────────────────────────────────
  mongo:
    image: mongo:7
    container_name: pm_mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    networks:
      - pm_network

  # ── Mongo Express (Admin UI) ───────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    container_name: pm_mongo_express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongo:27017
      ME_CONFIG_BASICAUTH: "false"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - pm_network

volumes:
  mongo_data:

networks:
  pm_network:
    driver: bridge
